

<div class="container">

    <h2>Add Employee</h2>

    <form (ngSubmit)="addEmployee()">

        <div class="form-group">
            <label>Name</label>
            <input
                type="text"
                [(ngModel)]="name"
                name="name" 
                required="The name is required">
    
                
        </div>

        <div class="form-group">
            <label>Department</label>
            <input
                type="text"
                [(ngModel)]="Department"
                name="department"
                required>
        </div>

        <div class="form-group">
            <label>Salary</label>
            <input
                type="number"
                [(ngModel)]="Salary"
                name="salary"
                required>
        </div>

        <button type="submit" (click)="formsubmitted()">
            Add Employee
        </button>

    </form>

</div>
